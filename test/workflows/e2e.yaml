# E2E Test Workflow — PayPal
#
# Prerequisites:
#   - PAYPAL_CLIENT_ID and PAYPAL_CLIENT_SECRET (sandbox)
#
# SKIP: Order capture/authorize (buyer approval), subscriptions (buyer approval),
# disputes (real dispute), payment tokens, invoice send/remind/cancel/record
# (need sent state + recipient email), QR code (406 in sandbox).

name: paypal-e2e
on:
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Create a product
        id: create_product
        uses: w3-io/w3-paypal-action@v0
        with:
          command: create-product
          client-id: ${{ secrets.PAYPAL_CLIENT_ID }}
          client-secret: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          api-url: https://api-m.sandbox.paypal.com
          body: '{"name":"E2E Test Product","type":"SERVICE","description":"Created by e2e test"}'

      - name: Extract product ID
        id: product
        run: |
          echo "id=$(echo '${{ steps.create_product.outputs.result }}' | jq -r '.id')" >> "$GITHUB_OUTPUT"

      - name: List products
        uses: w3-io/w3-paypal-action@v0
        with:
          command: list-products
          client-id: ${{ secrets.PAYPAL_CLIENT_ID }}
          client-secret: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          api-url: https://api-m.sandbox.paypal.com

      - name: Get the product
        uses: w3-io/w3-paypal-action@v0
        with:
          command: get-product
          client-id: ${{ secrets.PAYPAL_CLIENT_ID }}
          client-secret: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          api-url: https://api-m.sandbox.paypal.com
          product-id: ${{ steps.product.outputs.id }}

      - name: Update the product
        uses: w3-io/w3-paypal-action@v0
        with:
          command: update-product
          client-id: ${{ secrets.PAYPAL_CLIENT_ID }}
          client-secret: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          api-url: https://api-m.sandbox.paypal.com
          product-id: ${{ steps.product.outputs.id }}
          body: '[{"op":"replace","path":"/description","value":"Updated by e2e"}]'

      - name: Create an order
        id: create_order
        uses: w3-io/w3-paypal-action@v0
        with:
          command: create-order
          client-id: ${{ secrets.PAYPAL_CLIENT_ID }}
          client-secret: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          api-url: https://api-m.sandbox.paypal.com
          body: '{"intent":"CAPTURE","purchase_units":[{"amount":{"currency_code":"USD","value":"10.00"},"description":"E2E test order"}]}'

      - name: Extract order ID
        id: order
        run: |
          echo "id=$(echo '${{ steps.create_order.outputs.result }}' | jq -r '.id')" >> "$GITHUB_OUTPUT"

      - name: Get the order
        uses: w3-io/w3-paypal-action@v0
        with:
          command: get-order
          client-id: ${{ secrets.PAYPAL_CLIENT_ID }}
          client-secret: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          api-url: https://api-m.sandbox.paypal.com
          order-id: ${{ steps.order.outputs.id }}

      - name: Create a billing plan
        id: create_plan
        uses: w3-io/w3-paypal-action@v0
        with:
          command: create-plan
          client-id: ${{ secrets.PAYPAL_CLIENT_ID }}
          client-secret: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          api-url: https://api-m.sandbox.paypal.com
          body: '{"product_id":"${{ steps.product.outputs.id }}","name":"E2E Plan","billing_cycles":[{"frequency":{"interval_unit":"MONTH","interval_count":1},"tenure_type":"REGULAR","sequence":1,"total_cycles":12,"pricing_scheme":{"fixed_price":{"value":"10","currency_code":"USD"}}}],"payment_preferences":{"auto_bill_outstanding":true,"payment_failure_threshold":3}}'

      - name: Extract plan ID
        id: plan
        run: |
          echo "id=$(echo '${{ steps.create_plan.outputs.result }}' | jq -r '.id')" >> "$GITHUB_OUTPUT"

      - name: List billing plans
        uses: w3-io/w3-paypal-action@v0
        with:
          command: list-plans
          client-id: ${{ secrets.PAYPAL_CLIENT_ID }}
          client-secret: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          api-url: https://api-m.sandbox.paypal.com

      - name: Get the billing plan
        uses: w3-io/w3-paypal-action@v0
        with:
          command: get-plan
          client-id: ${{ secrets.PAYPAL_CLIENT_ID }}
          client-secret: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          api-url: https://api-m.sandbox.paypal.com
          plan-id: ${{ steps.plan.outputs.id }}

      - name: Deactivate the billing plan
        uses: w3-io/w3-paypal-action@v0
        with:
          command: deactivate-plan
          client-id: ${{ secrets.PAYPAL_CLIENT_ID }}
          client-secret: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          api-url: https://api-m.sandbox.paypal.com
          plan-id: ${{ steps.plan.outputs.id }}

      - name: Activate the billing plan
        uses: w3-io/w3-paypal-action@v0
        with:
          command: activate-plan
          client-id: ${{ secrets.PAYPAL_CLIENT_ID }}
          client-secret: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          api-url: https://api-m.sandbox.paypal.com
          plan-id: ${{ steps.plan.outputs.id }}

      - name: Create an invoice
        id: create_invoice
        uses: w3-io/w3-paypal-action@v0
        with:
          command: create-invoice
          client-id: ${{ secrets.PAYPAL_CLIENT_ID }}
          client-secret: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          api-url: https://api-m.sandbox.paypal.com
          body: '{"detail":{"currency_code":"USD"},"items":[{"name":"E2E Item","quantity":"1","unit_amount":{"currency_code":"USD","value":"25.00"}}]}'

      - name: Extract invoice ID
        id: invoice
        run: |
          echo "id=$(echo '${{ steps.create_invoice.outputs.result }}' | jq -r '.href' | grep -o '[^/]*$')" >> "$GITHUB_OUTPUT"

      - name: List invoices
        uses: w3-io/w3-paypal-action@v0
        with:
          command: list-invoices
          client-id: ${{ secrets.PAYPAL_CLIENT_ID }}
          client-secret: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          api-url: https://api-m.sandbox.paypal.com

      - name: Get the invoice
        uses: w3-io/w3-paypal-action@v0
        with:
          command: get-invoice
          client-id: ${{ secrets.PAYPAL_CLIENT_ID }}
          client-secret: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          api-url: https://api-m.sandbox.paypal.com
          invoice-id: ${{ steps.invoice.outputs.id }}

      - name: Delete the draft invoice
        uses: w3-io/w3-paypal-action@v0
        with:
          command: delete-invoice
          client-id: ${{ secrets.PAYPAL_CLIENT_ID }}
          client-secret: ${{ secrets.PAYPAL_CLIENT_SECRET }}
          api-url: https://api-m.sandbox.paypal.com
          invoice-id: ${{ steps.invoice.outputs.id }}

      # SKIP: get-balances requires elevated sandbox permissions
      # - name: Get balances
      #   uses: w3-io/w3-paypal-action@v0
      #   with:
      #     command: get-balances
      #     client-id: ${{ secrets.PAYPAL_CLIENT_ID }}
      #     client-secret: ${{ secrets.PAYPAL_CLIENT_SECRET }}
      #     api-url: https://api-m.sandbox.paypal.com
