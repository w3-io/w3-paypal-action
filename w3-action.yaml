  - name: generate-invoice-qr
    description: Generate a QR code for an invoice.
    inputs:
      invoice-id:
        type: string
        required: true
    outputs:
      result:
        type: object
        description: QR code image data
  - name: generate-invoice-number
    description: Generate the next invoice number.
    inputs: {}
    outputs:
      result:
        type: object
        description: "{invoice_number}"
  - name: search-invoices
    description: Search invoices by status, date, recipient, or amount.
    inputs:
      body:
        type: object
        required: true
    outputs:
      result:
        type: object
        description: "{items, total_items}"
  - name: list-invoice-templates
    description: List invoice templates.
    inputs:
      page:
        type: number
        required: false
      page-size:
        type: number
        required: false
    outputs:
      result:
        type: object
        description: "{templates, links}"
  - name: create-invoice-template
    description: Create an invoice template.
    inputs:
      body:
        type: object
        required: true
    outputs:
      result:
        type: object
        description: "{id, name, template_info}"
  - name: get-invoice-template
    description: Get an invoice template by ID.
    inputs:
      template-id:
        type: string
        required: true
    outputs:
      result:
        type: object
        description: "{id, name, template_info}"
  - name: update-invoice-template
    description: Update an invoice template.
    inputs:
      template-id:
        type: string
        required: true
      body:
        type: object
        required: true
    outputs:
      result:
        type: object
        description: Updated template
  - name: delete-invoice-template
    description: Delete an invoice template.
    inputs:
      template-id:
        type: string
        required: true
    outputs:
