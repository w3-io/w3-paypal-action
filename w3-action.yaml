    inputs:
      invoice-id:
        type: string
        required: true
      body:
        type: object
        required: true
    outputs:
      result:
        type: object
        description: Updated invoice
  - name: delete-invoice
    description: Delete a draft invoice.
    inputs:
      invoice-id:
        type: string
        required: true
    outputs:
      result:
        type: object
        description: "{status: deleted}"
  - name: send-invoice
    description: Send a draft invoice to the recipient.
    inputs:
      invoice-id:
        type: string
        required: true
    outputs:
      result:
        type: object
        description: "{status: SENT}"
  - name: remind-invoice
    description: Send a reminder for an unpaid invoice.
    inputs:
      invoice-id:
        type: string
        required: true
    outputs:
      result:
        type: object
        description: Reminder sent confirmation
  - name: cancel-invoice
    description: Cancel a sent invoice.
    inputs:
      invoice-id:
        type: string
        required: true
    outputs:
      result:
        type: object
        description: "{status: CANCELLED}"
  - name: record-invoice-payment
    description: Record an external payment against an invoice.
    inputs:
      invoice-id:
        type: string
        required: true
      body:
        type: object
        required: true
    outputs:
      result:
        type: object
        description: Payment recorded
  - name: delete-invoice-payment
    description: Delete a recorded payment from an invoice.
    inputs:
      invoice-id:
        type: string
        required: true
      payment-id:
        type: string
        required: true
    outputs:
      result:
        type: object
        description: Payment record deleted
  - name: record-invoice-refund
    description: Record a refund against an invoice.
    inputs:
      invoice-id:
        type: string
        required: true
      body:
        type: object
        required: true
    outputs:
      result:
        type: object
