      type: object
      required: true
      description: '{product_id, name, billing_cycles}'
- name: list-plans
  description: List billing plans with pagination.
  inputs:
    page-size:
      type: number
      required: false
    page:
      type: number
      required: false
- name: get-plan
  description: Get billing plan details.
  inputs:
    plan-id:
      type: string
      required: true
- name: update-plan
  description: Patch a billing plan.
  inputs:
    plan-id:
      type: string
      required: true
    body:
      type: object
      required: true
- name: activate-plan
  description: Activate a billing plan.
  inputs:
    plan-id:
      type: string
      required: true
- name: deactivate-plan
  description: Deactivate a billing plan.
  inputs:
    plan-id:
      type: string
      required: true
- name: update-plan-pricing
  description: Update pricing schemes on a billing plan.
  inputs:
    plan-id:
      type: string
      required: true
    body:
      type: object
      required: true
- name: create-subscription
  description: Create a subscription. Returns approval URL for customer consent.
  inputs:
    body:
      type: object
      required: true
      description: '{plan_id, subscriber}'
- name: get-subscription
  description: Get subscription details.
  inputs:
    subscription-id:
      type: string
      required: true
- name: update-subscription
  description: Patch a subscription.
  inputs:
    subscription-id:
      type: string
      required: true
    body:
      type: object
      required: true
- name: revise-subscription
  description: Revise a subscription (plan change, quantity update).
  inputs:
    subscription-id:
      type: string
      required: true
    body:
      type: object
      required: true
- name: suspend-subscription
  description: Suspend an active subscription.
  inputs:
    subscription-id:
      type: string
      required: true
- name: cancel-subscription
  description: Cancel a subscription.
  inputs:
    subscription-id:
      type: string
      required: true
- name: activate-subscription
  description: Reactivate a suspended subscription.
  inputs:
    subscription-id:
      type: string
      required: true
- name: capture-subscription
  description: Capture an outstanding subscription payment.
  inputs:
    subscription-id:
      type: string
      required: true
    body:
      type: object
      required: true
- name: list-subscription-transactions
  description: List billing transactions for a subscription.
  inputs:
    subscription-id:
      type: string
      required: true
    start-date:
      type: string
      required: false
    end-date:
      type: string
      required: false
- name: create-invoice
  description: Create a draft invoice.
  inputs:
    body:
      type: object
      required: true
      description: '{detail, primary_recipients, items}'
- name: list-invoices
  description: List invoices with pagination.
  inputs:
    page:
      type: number
      required: false
    page-size:
      type: number
      required: false
- name: get-invoice
  description: Get invoice details.
  inputs:
    invoice-id:
      type: string
      required: true
- name: update-invoice
  description: Full update of a draft invoice.
  inputs:
    invoice-id:
      type: string
      required: true
    body:
      type: object
      required: true
- name: delete-invoice
  description: Delete a draft invoice.
  inputs:
    invoice-id:
      type: string
      required: true
- name: send-invoice
  description: Send a draft invoice to the recipient.
  inputs:
    invoice-id:
      type: string
      required: true
- name: remind-invoice
  description: Send a reminder for an unpaid invoice.
  inputs:
    invoice-id:
      type: string
      required: true
- name: cancel-invoice
  description: Cancel a sent invoice.
