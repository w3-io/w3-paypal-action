- name: list-webhooks
  description: List configured webhook endpoints.
- name: get-webhook
  description: Get webhook endpoint details.
  inputs:
    webhook-id:
      type: string
      required: true
- name: update-webhook
  description: Update a webhook endpoint.
  inputs:
    webhook-id:
      type: string
      required: true
    body:
      type: object
      required: true
- name: delete-webhook
  description: Delete a webhook endpoint.
  inputs:
    webhook-id:
      type: string
      required: true
- name: list-webhook-event-types
  description: List all available webhook event types.
- name: list-webhook-events
  description: List webhook event notifications.
  inputs:
    start-date:
      type: string
      required: false
    end-date:
