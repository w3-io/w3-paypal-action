  - name: list-subscription-transactions
    description: List billing transactions for a subscription.
    inputs:
      subscription-id:
        type: string
        required: true
      start-date:
        type: string
        required: false
      end-date:
        type: string
        required: false
    outputs:
      result:
        type: object
        description: "{transactions, total_items}"
  - name: create-invoice
    description: Create a draft invoice.
    inputs:
      body:
