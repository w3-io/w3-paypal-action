        required: true
        description: "{detail, primary_recipients, items}"
    outputs:
      result:
        type: object
        description: "{id, status: DRAFT, detail}"
  - name: list-invoices
    description: List invoices with pagination.
    inputs:
      page:
        type: number
        required: false
      page-size:
