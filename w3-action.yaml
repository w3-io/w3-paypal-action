        type: object
        description: "{status: ACTIVE}"
  - name: capture-subscription
    description: Capture an outstanding subscription payment.
    inputs:
      subscription-id:
        type: string
        required: true
      body:
        type: object
        required: true
    outputs:
      result:
        type: object
