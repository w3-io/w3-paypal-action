  - name: create-plan
    description: Create a billing plan for subscriptions.
    inputs:
      body:
        type: object
        required: true
        description: "{product_id, name, billing_cycles}"
    outputs:
      result:
        type: object
        description: "{id, status, billing_cycles, payment_preferences}"
  - name: list-plans
    description: List billing plans with pagination.
    inputs:
      page-size:
        type: number
        required: false
      page:
        type: number
        required: false
    outputs:
      result:
        type: object
        description: "{plans, total_items, links}"
  - name: get-plan
    description: Get billing plan details.
    inputs:
      plan-id:
        type: string
        required: true
    outputs:
      result:
        type: object
        description: "{id, status, billing_cycles, payment_preferences}"
  - name: update-plan
    description: Patch a billing plan.
    inputs:
      plan-id:
        type: string
        required: true
      body:
        type: object
        required: true
    outputs:
      result:
        type: object
        description: Updated plan
  - name: activate-plan
    description: Activate a billing plan.
    inputs:
      plan-id:
        type: string
        required: true
    outputs:
      result:
        type: object
        description: "{status: ACTIVE}"
  - name: deactivate-plan
    description: Deactivate a billing plan.
    inputs:
      plan-id:
        type: string
        required: true
    outputs:
      result:
        type: object
        description: "{status: INACTIVE}"
  - name: update-plan-pricing
    description: Update pricing schemes on a billing plan.
    inputs:
      plan-id:
        type: string
        required: true
      body:
        type: object
        required: true
    outputs:
      result:
        type: object
        description: Updated pricing
  - name: create-subscription
    description: Create a subscription. Returns approval URL for customer consent.
    inputs:
      body:
        type: object
        required: true
        description: "{plan_id, subscriber}"
    outputs:
      result:
        type: object
