kind: integration
name: PayPal orders, payments, payouts, subscriptions, invoicing, disputes, vault,
  and reporting
version: 0.1.0
repo: w3-io/w3-paypal-action
partner: PayPal
description: PayPal orders, payments, payouts, subscriptions, invoicing, disputes,
  vault, and reporting
context: "Complete PayPal REST API with automatic OAuth2 token management. 88 commands\
  \ across the full PayPal platform.\n\nKey automation patterns:\n**Payouts (fully\
  \ automated, no user interaction):** Send money to one or many recipients via email,\
  \ phone, or PayPal ID. Up to 15,000 items per batch. Use for affiliate payments,\
  \ salary, refunds, rewards.\n**Invoicing (fully automated):** Create, send, remind,\
  \ cancel invoices. Track payment status with search-invoices. Combine with w3/mongodb\
  \ for state and w3/email for follow-up.\n**Subscriptions (setup + auto-billing):**\
  \ Create products and plans programmatically. Customer approves once, PayPal handles\
  \ recurring charges. Monitor with list-subscription-transactions.\n**Orders (workflow-initiated,\
  \ needs approval):** create-order returns an approval URL the customer must visit.\
  \ Since W3 workflows are async, use a callback to deliver the URL to your frontend:\n\
  ```yaml - uses: w3/paypal@v1\n  id: order\n  with:\n    command: create-order\n\
  \    body: '{\"intent\":\"CAPTURE\",\"purchase_units\":[{\"amount\":{\"currency_code\"\
  :\"USD\",\"value\":\"99.00\"}}]}'\n\n- uses: w3/http@v1\n  with:\n    method: POST\n\
  \    url: ${{ trigger.data.callback_url }}\n    body: '{\"approval_url\":\"...\"\
  ,\"order_id\":\"...\"}'\n```\nThe caller includes callback_url in the trigger data\
  \ and receives the approval URL via HTTP callback. After the customer approves,\
  \ trigger a second workflow (or use webhooks) to capture-order.\n\n**Dispute management:**\
  \ React to chargebacks — list disputes, submit evidence, send messages, make/accept/deny\
  \ offers.\n\nPYUSD note: PayPal's stablecoin is a standard ERC-20/SPL token. Use\
  \ the W3 bridge SDK (w3/ethereum or w3/solana syscalls) for PYUSD operations, not\
  \ this action.\n\n**Coverage:** This registry includes 27 high-value commands for\
  \ workflow automation. The full action supports 88 commands covering the complete\
  \ PayPal REST API — including update-order, void-authorization, reauthorize, remind-invoice,\
  \ update-invoice, suspend-subscription, activate-subscription, revise-subscription,\
  \ get-payout-item, create/update/delete webhook, and more. See the full command\
  \ list at https://github.com/w3-io/w3-paypal-action.\n\n**PayPal's own MCP server**\
  \ (github.com/paypal/paypal-mcp-server) provides 30+ tools for direct PayPal API\
  \ access outside of W3 workflows. Use it for ad-hoc API exploration. Use this W3\
  \ action for verified, consensus-backed execution within workflows.\n\nTwo environments:\
  \ sandbox (api-m.sandbox.paypal.com, default) and production (api-m.paypal.com).\
  \ OAuth2 credentials from developer.paypal.com.\n"
commands:
- name: create-order
  description: Create a checkout order. Returns approval URL for customer redirect.
  inputs:
    body:
      type: object
      required: true
      description: '{intent, purchase_units}'
- name: get-order
  description: Get order details by ID.
  inputs:
    order-id:
      type: string
      required: true
- name: update-order
  description: Patch an order (add/replace/remove fields).
  inputs:
    order-id:
      type: string
      required: true
    body:
      type: object
      required: true
      description: JSON Patch array
- name: authorize-order
  description: Authorize (hold) payment on an approved order.
  inputs:
    order-id:
      type: string
      required: true
- name: capture-order
  description: Capture payment for an approved order.
  inputs:
    order-id:
      type: string
      required: true
- name: confirm-order
  description: Confirm payment source for an order.
  inputs:
    order-id:
      type: string
      required: true
    body:
      type: object
      required: true
- name: track-order
  description: Add tracking info to an order.
  inputs:
    order-id:
      type: string
      required: true
    body:
      type: object
      required: true
- name: update-order-tracking
  description: Update existing tracking on an order.
  inputs:
    order-id:
      type: string
      required: true
    tracker-id:
      type: string
      required: true
    body:
      type: object
      required: true
- name: get-authorization
  description: Get details of an authorization hold.
  inputs:
    authorization-id:
      type: string
      required: true
- name: capture-authorization
  description: Capture a previously authorized payment.
  inputs:
    authorization-id:
      type: string
      required: true
- name: reauthorize
  description: Reauthorize an expired authorization.
  inputs:
    authorization-id:
      type: string
      required: true
- name: void-authorization
  description: Void (cancel) an authorization hold.
  inputs:
    authorization-id:
      type: string
      required: true
- name: get-capture
  description: Get capture details.
  inputs:
    capture-id:
      type: string
      required: true
- name: refund-capture
  description: Refund a captured payment (full or partial).
  inputs:
    capture-id:
      type: string
      required: true
    body:
      type: object
      required: false
      description: Optional partial refund amount
- name: get-refund
  description: Get refund details.
  inputs:
    refund-id:
      type: string
      required: true
- name: create-payout
  description: Send money to one or many recipients (email, phone, PayPal ID).
  inputs:
    body:
      type: object
      required: true
      description: '{sender_batch_header, items}'
- name: get-payout
  description: Get batch payout status.
  inputs:
    payout-id:
      type: string
      required: true
- name: get-payout-item
  description: Get individual payout item details.
  inputs:
    item-id:
      type: string
      required: true
- name: cancel-payout-item
  description: Cancel an unclaimed payout item.
  inputs:
    item-id:
      type: string
      required: true
- name: create-plan
  description: Create a billing plan for subscriptions.
  inputs:
